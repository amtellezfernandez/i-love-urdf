name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.19.6", "22", "24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build:package

      - name: Check Dist Is Current
        run: git diff --exit-code -- dist

      - name: Check Install Paths
        run: pnpm check:install

      - name: Check Browser Entry
        run: pnpm check:browser-entry

      - name: Targeted Tests
        run: pnpm test

      - name: Setup XACRO Runtime
        run: pnpm setup:xacro

      - name: Probe XACRO Runtime
        run: pnpm ilu probe-xacro-runtime

      - name: Check Performance Budget
        if: matrix.node-version == '20.19.6'
        run: pnpm check:performance

      - name: Smoke Test
        run: pnpm smoke

  verify-cross-platform:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        node-version: ["20.19.6"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build:package

      - name: Check Dist Is Current
        run: git diff --exit-code -- dist

      - name: Check Install Paths
        run: pnpm check:install

      - name: Check Browser Entry
        run: pnpm check:browser-entry

      - name: Targeted Tests
        run: pnpm test

      - name: Smoke Test
        run: pnpm smoke
