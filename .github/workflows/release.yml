name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build:package

      - name: Check Dist Is Current
        run: git diff --exit-code -- dist

      - name: Check Install Paths
        run: pnpm check:install

      - name: Check Browser Entry
        run: pnpm check:browser-entry

      - name: Targeted Tests
        run: pnpm test

      - name: Setup XACRO Runtime
        run: pnpm setup:xacro

      - name: Probe XACRO Runtime
        run: pnpm ilu probe-xacro-runtime

      - name: Smoke Test
        run: pnpm smoke

      - name: Check Performance Budget
        run: pnpm check:performance

      - name: Real Repository Verification
        run: pnpm test:real-repos

      - name: Pack Release Tarball
        run: mkdir -p .release-artifacts && pnpm pack --pack-destination .release-artifacts

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: .release-artifacts/*.tgz
