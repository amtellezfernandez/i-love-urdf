name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  cross-platform-readiness:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm build:package

      - name: Check Dist Is Current
        run: git diff --exit-code -- dist

      - name: Check Install Paths
        run: pnpm check:install

      - name: Check Architecture Budget
        run: pnpm check:architecture

      - name: Check Security Posture
        run: pnpm check:security

      - name: Check Production Vulnerabilities
        run: pnpm check:vulnerabilities

      - name: Check Browser Entry
        run: pnpm check:browser-entry

      - name: Targeted Tests
        run: pnpm test

      - name: Smoke Test
        run: pnpm smoke

  release-readiness:
    needs: cross-platform-readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm build:package

      - name: Check Dist Is Current
        run: git diff --exit-code -- dist

      - name: Check Install Paths
        run: pnpm check:install

      - name: Check Architecture Budget
        run: pnpm check:architecture

      - name: Check Security Posture
        run: pnpm check:security

      - name: Check Production Vulnerabilities
        run: pnpm check:vulnerabilities

      - name: Check Browser Entry
        run: pnpm check:browser-entry

      - name: Targeted Tests
        run: pnpm test

      - name: Setup XACRO Runtime
        run: pnpm setup:xacro

      - name: Probe XACRO Runtime
        run: pnpm ilu probe-xacro-runtime

      - name: Smoke Test
        run: pnpm smoke

      - name: Check Performance Budget
        run: pnpm check:performance

      - name: Real Repository Verification
        run: pnpm test:real-repos

      - name: Generate Release Notes
        run: mkdir -p .release-artifacts && pnpm release:notes -- --version "${GITHUB_REF_NAME#v}" > .release-artifacts/RELEASE_NOTES.md

      - name: Pack Release Tarball
        run: pnpm pack --pack-destination .release-artifacts

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: .release-artifacts/

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release-readiness
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: .release-artifacts

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file .release-artifacts/RELEASE_NOTES.md
            gh release upload "$GITHUB_REF_NAME" .release-artifacts/*.tgz --clobber
          else
            gh release create "$GITHUB_REF_NAME" .release-artifacts/*.tgz --title "$GITHUB_REF_NAME" --notes-file .release-artifacts/RELEASE_NOTES.md
          fi

      - name: Setup Node For npm Publish
        if: ${{ secrets.NPM_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
          registry-url: https://registry.npmjs.org

      - name: Publish npm Package
        if: ${{ secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish .release-artifacts/*.tgz --provenance --access public

      - name: Skip npm Publish
        if: ${{ secrets.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN not configured; skipped npm publish."
